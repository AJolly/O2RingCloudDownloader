[Settings]
email = your_email@example.com
password = your_password
output_dir = data
generate_csv = true

# Set to true to automatically run the HR Spike Analysis and generate an HTML report after download.
run_analysis_report = true

# Minimum session duration (in minutes) to download. Useful for skipping brief sessions.
# Set to 0 to download all sessions. 60 = 1 hour.
skip_short_sessions_under_mins = 60

# Optional path to an executable or script to launch after CSVs are generated
# (e.g., C:\Program Files\OSCAR\OSCAR.exe or a custom python script)
# Leave blank to disable.
launch_after =
